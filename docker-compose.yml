# Docker Compose for Production Deployment
# Deploys the full stack including the main application

services:
  # DV-Agent Application
  dv-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dv-agent-app
    ports:
      - "8080:8080"
    environment:
      # Application settings
      - DV_AGENT_ENVIRONMENT=production
      - DV_AGENT_DEBUG=false
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
      # A2A Server
      - A2A_HOST=0.0.0.0
      - A2A_PORT=8080
      
      # LLM Provider (use env file for sensitive data)
      - LLM_PRIMARY_PROVIDER=${LLM_PRIMARY_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_OLLAMA_BASE_URL=http://ollama:11434
      
      # Logging
      - LOG_LEVEL=INFO
      - LOG_JSON_FORMAT=true
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - dv-agent-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis - Session storage
  redis:
    image: redis:7-alpine
    container_name: dv-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - dv-agent-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # PostgreSQL - Long-term memory structured storage
  postgres:
    image: postgres:16-alpine
    container_name: dv-agent-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-dv_agent}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - dv-agent-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # Milvus - Vector database for memory retrieval
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: dv-agent-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dv-agent-network
    profiles:
      - memory

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: dv-agent-milvus-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dv-agent-network
    profiles:
      - memory

  milvus:
    # 升级到 v2.4.x 以支持稀疏向量 (SPARSE_FLOAT_VECTOR)
    image: milvusdb/milvus:v2.4.5
    container_name: dv-agent-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_ENDPOINTS=milvus-etcd:2379
      - MINIO_ADDRESS=milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - milvus-etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always
    networks:
      - dv-agent-network
    profiles:
      - memory
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Ollama - Local LLM (optional for production)
  ollama:
    image: ollama/ollama:latest
    container_name: dv-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    networks:
      - dv-agent-network
    profiles:
      - ollama  # Only start with --profile ollama
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    # GPU support (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: dv-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dv-agent
    restart: always
    networks:
      - dv-agent-network
    profiles:
      - nginx  # Only start with --profile nginx

  # Prometheus - Metrics collection (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: dv-agent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - dv-agent-network
    profiles:
      - monitoring

  # Grafana - Metrics visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: dv-agent-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - dv-agent-network
    profiles:
      - monitoring

  # ==================== Frontend ====================
  
  # React Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dv-agent-frontend
    ports:
      - "3080:80"
    depends_on:
      apisix:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dv-agent-network
    profiles:
      - gateway
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ==================== APISIX API Gateway ====================
  
  # etcd for APISIX (separate from Milvus etcd)
  apisix-etcd:
    image: bitnami/etcd:3.5
    container_name: dv-agent-apisix-etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://apisix-etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - dv-agent-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - gateway

  # APISIX API Gateway
  apisix:
    image: apache/apisix:3.8.0-debian
    container_name: dv-agent-apisix
    depends_on:
      apisix-etcd:
        condition: service_healthy
      dv-agent:
        condition: service_healthy
    ports:
      - "9080:9080"    # HTTP 入口
      - "9443:9443"    # HTTPS 入口
      - "9180:9180"    # Admin API
    volumes:
      - ./deploy/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./deploy/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    networks:
      - dv-agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/apisix/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - gateway
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  milvus_data:
    driver: local
  milvus_etcd_data:
    driver: local
  milvus_minio_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  etcd_data:
    driver: local

networks:
  dv-agent-network:
    driver: bridge
