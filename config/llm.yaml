# LLM Provider Configuration
# 配置多个LLM Provider，支持自动降级

# 默认Provider（启动时使用）
default_provider: openai

# Provider配置列表
providers:
  openai:
    type: openai
    api_key: ${OPENAI_API_KEY}  # 从环境变量读取
    base_url: https://api.openai.com/v1
    model: gpt-4o
    timeout: 30
    max_retries: 3
    # 可选配置
    temperature: 0.7
    max_tokens: 4096
    
  deepseek:
    type: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    timeout: 30
    max_retries: 3
    temperature: 0.7
    max_tokens: 4096
    
  ollama:
    type: ollama
    base_url: http://localhost:11434
    model: llama3.2
    timeout: 60  # 本地模型可能较慢
    max_retries: 2

# 降级链配置（按顺序尝试）
fallback_chain:
  - openai
  - deepseek
  - ollama

# 重试策略
retry:
  max_retries: 3
  base_delay: 1.0      # 基础延迟（秒）
  max_delay: 30.0      # 最大延迟（秒）
  exponential_base: 2  # 指数退避基数
  jitter: true         # 随机抖动
  
  # 可重试的错误类型
  retryable_errors:
    - RateLimitError
    - TimeoutError
    - ServiceUnavailableError
    - ConnectionError
    
  # 不可重试的错误类型
  non_retryable_errors:
    - InvalidRequestError
    - AuthenticationError
    - ContentPolicyViolation

# Token计数与成本追踪
token_tracking:
  enabled: true
  # 各模型的定价（每1K tokens，美元）
  pricing:
    gpt-4o:
      input: 0.0025
      output: 0.01
    gpt-4-turbo:
      input: 0.01
      output: 0.03
    deepseek-chat:
      input: 0.0001
      output: 0.0002
