# Docker Compose - RAG Services
# RAG 服务的 Docker Compose 配置
#
# 包含：
# - MinIO (对象存储)
# - Milvus (向量数据库)
# - PostgreSQL (关系数据库)
# - Redis (缓存)
#
# 使用方法:
#   docker-compose -f docker-compose.rag.yml up -d

version: '3.8'

services:
  # ============ MinIO 对象存储 ============
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: dv-agent-minio
    ports:
      - "9000:9000"      # API 端口
      - "9001:9001"      # Console 端口
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # MinIO 初始化 (创建 bucket)
  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: dv-agent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
      mc mb myminio/documents --ignore-existing;
      mc mb myminio/embeddings --ignore-existing;
      mc policy set download myminio/documents;
      echo 'MinIO buckets initialized';
      "
    networks:
      - rag-network

  # ============ Milvus 向量数据库 ============
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: dv-agent-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - rag-network

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: dv-agent-milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  milvus:
    # 升级到 v2.4.x 以支持稀疏向量 (SPARSE_FLOAT_VECTOR)
    image: milvusdb/milvus:v2.4.5
    container_name: dv-agent-milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    ports:
      - "19530:19530"    # gRPC 端口
      - "9091:9091"      # Metrics 端口
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      COMMON_STORAGETYPE: minio
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - rag-network

  # Milvus Web UI (可选)
  attu:
    # 升级 Attu 以匹配 Milvus v2.4.x
    image: zilliz/attu:v2.4
    container_name: dv-agent-attu
    depends_on:
      - milvus
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus:19530
    restart: unless-stopped
    networks:
      - rag-network

  # ============ PostgreSQL 数据库 ============
  postgres:
    image: postgres:15-alpine
    container_name: dv-agent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-dv_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init_memory.sql:ro
      - ./scripts/init_rag_postgres.sql:/docker-entrypoint-initdb.d/02_init_rag.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-network

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: dv-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-network

# ============ 网络配置 ============
networks:
  rag-network:
    driver: bridge
    name: dv-agent-rag-network

# ============ 数据卷 ============
volumes:
  minio_data:
    name: dv-agent-minio-data
  milvus_data:
    name: dv-agent-milvus-data
  milvus_minio_data:
    name: dv-agent-milvus-minio-data
  etcd_data:
    name: dv-agent-etcd-data
  postgres_data:
    name: dv-agent-postgres-data
  redis_data:
    name: dv-agent-redis-data
